<!doctype html>
<html>
  <head>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <title>AI Search</title>
  </head>
  <body>
    <div class="container mt-5">
      <h2>AI Database Search</h2>
      <a href="{% url 'card_list' %}" class="btn btn-primary mb-3">Back</a>
      <form method="post">
        {% csrf_token %}

        <input
          type="text"
          name="query"
          placeholder="Search students..."
          required
        />

        <button type="submit">Search</button>
      </form>

      <hr />

      <pre>{{ result }}</pre>
    </div>
  </body>
</html>
