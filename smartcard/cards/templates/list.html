<!doctype html>
<html>
  <head>
    <title>Card List</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="container mt-5">
      <h3>Smart Card List</h3>

      <a href="/add/" class="btn btn-primary mb-3">Add New Card</a>
      <a href="/search/" class="btn btn-primary mb-3">Ai Search</a>

      <table class="table table-bordered">
        <thead class="table-dark">
          <tr>
            <th>Name</th>
            <th>Card Number</th>
            <th>Balance</th>
            <th>Actions</th>
          </tr>
        </thead>

        <tbody>
          {% for card in cards %}
          <tr>
            <td>{{ card.name }}</td>
            <td>{{ card.card_number }}</td>
            <td>{{ card.balance }}</td>
            <td>
              <div class="d-flex gap-2">
                <a href="/edit/{{ card.id }}/" class="btn btn-warning btn-sm">
                  Edit
                </a>

                <form
                  method="post"
                  action="/delete/{{ card.id }}/"
                  onsubmit="return confirm('Are you sure you want to delete?');"
                >
                  {% csrf_token %}
                  <button type="submit" class="btn btn-danger btn-sm">
                    Delete
                  </button>
                </form>
              </div>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </body>
</html>
